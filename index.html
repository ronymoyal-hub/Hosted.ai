async function decryptContent(){
  try{
    const enc=new TextEncoder();
    const dec=new TextDecoder();
    
    const saltBuf=new Uint8Array(JSON.parse('['+SALT+']'));
    const ivBuf=new Uint8Array(JSON.parse('['+IV+']'));

    const elapsed=Date.now()-session.timestamp;
    const remaining=SESSION_TIMEOUT_MINUTES*60*1000-elapsed;
    
    if(remaining<=0){
      clearSession();
      return;
    }
    
    setTimeout(updateTimer,1000);
  };
  
  updateTimer();
}

function clearSession(){
  sessionStorage.removeItem(SESSION_KEY);
  location.reload();

function checkExistingSession(){
  const session=JSON.parse(sessionStorage.getItem(SESSION_KEY)||'null');
  if(!session) return false;
  
  const elapsed=Date.now()-session.timestamp;
  if(elapsed>SESSION_TIMEOUT_MINUTES*60*1000){

    return false;
  }
  
  renderContent(session.html);
  startSessionTimer();
  return true;
}
