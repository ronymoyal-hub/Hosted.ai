const ITERATIONS = 250000;

function b64ToBuf(b64){
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return arr.buffer;
}

async function tryDecrypt(password){
  const enc = new TextEncoder();
  const salt = b64ToBuf(SALT_B64);
  const iv = b64ToBuf(IV_B64);
  const ciphertext = b64ToBuf(CIPHERTEXT_B64);
  const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), {name:'PBKDF2'}, false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt, iterations:ITERATIONS, hash:'SHA-256'},
    baseKey, {name:'AES-GCM', length:256}, false, ['decrypt']
  );
  const plainBuf = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, ciphertext);
  return new TextDecoder().decode(plainBuf);
}

document.getElementById('gate').addEventListener('submit', async (e)=>{
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  const pw = document.getElementById('pw').value;
  btn.disabled = true; btn.textContent = 'Unlocking…'; err.textContent = '';
  try{
    const html = await tryDecrypt(pw);
    document.open();
    document.write(html);
    document.close();
  }catch(ex){
    err.textContent = 'Incorrect password. Please try again.';
    btn.disabled = false; btn.textContent = 'Unlock';
  }
});
</script>
