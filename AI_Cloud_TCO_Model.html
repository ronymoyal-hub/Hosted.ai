const ITERATIONS = 250000;

function b64ToBytes(b64){
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function tryUnlock(){
  const pw = document.getElementById('pw').value;
  const errEl = document.getElementById('err');
  errEl.textContent = '';
  if (!pw) { errEl.textContent = 'Please enter a password.'; return; }
  try {
    const enc = new TextEncoder();
    const salt = b64ToBytes(SALT_B64);
    const iv = b64ToBytes(IV_B64);
    const ciphertext = b64ToBytes(CIPHERTEXT_B64);

    const baseKey = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: salt, iterations: ITERATIONS, hash: 'SHA-256' },
      baseKey,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
    const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, ciphertext);
    const html = new TextDecoder().decode(plainBuf);
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    errEl.textContent = 'Incorrect password. Please try again.';
  }
}

document.getElementById('btn').addEventListener('click', tryUnlock);
document.getElementById('pw').addEventListener('keydown', function(e){ if (e.key === 'Enter') tryUnlock(); });
</script>
