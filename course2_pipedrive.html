<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipedrive Sales Process - Online Course</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 40px 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        header p {
            font-size: 16px;
            opacity: 0.9;
        }
        .course-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 8px 16px;
            background: white;
            border: 2px solid #11998e;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            color: #11998e;
            transition: all 0.3s;
        }
        .nav-btn:hover {
            background: #11998e;
            color: white;
        }
        .nav-btn.active {
            background: #11998e;
            color: white;
        }
        .content-area {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        .module h2 {
            color: #11998e;
            font-size: 28px;
            margin-bottom: 30px;
            border-bottom: 3px solid #11998e;
            padding-bottom: 15px;
        }
        .lesson {
            margin-bottom: 30px;
            padding: 20px;
            background: #f0fffe;
            border-left: 4px solid #11998e;
            border-radius: 5px;
        }
        .lesson h3 {
            color: #333;
            font-size: 22px;
            margin-bottom: 15px;
        }
        .lesson-content {
            line-height: 1.8;
            color: #555;
            font-size: 15px;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }
        .key-points {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }
        .key-points h4 {
            color: #11998e;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .key-point-tag {
            display: inline-block;
            background: #11998e;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        .quiz-container {
            animation: fadeIn 0.3s;
        }
        .quiz-title {
            text-align: center;
            color: #11998e;
            font-size: 26px;
            margin-bottom: 10px;
        }
        .quiz-subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .quiz-question {
            margin-bottom: 25px;
            padding: 20px;
            background: #f0fffe;
            border-radius: 8px;
        }
        .quiz-question-text {
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .quiz-option {
            padding: 12px 16px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }
        .quiz-option:hover {
            border-color: #11998e;
            background: #f0fffe;
        }
        .quiz-option.selected {
            border-color: #11998e;
            background: #f0fffe;
        }
        .quiz-option.correct {
            border-color: #4caf50;
            background: #e8f5e9;
            color: #2e7d32;
        }
        .quiz-option.incorrect {
            border-color: #f44336;
            background: #ffebee;
            color: #c62828;
        }
        .quiz-results {
            text-align: center;
            padding: 30px;
            background: #e0f7f4;
            border-radius: 8px;
            margin: 30px 0;
        }
        .quiz-score {
            font-size: 48px;
            font-weight: 700;
            color: #11998e;
            margin-bottom: 10px;
        }
        .quiz-feedback {
            font-size: 16px;
            color: #333;
            margin-bottom: 20px;
        }
        .navigation {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 30px;
        }
        .nav-btn-large {
            padding: 12px 24px;
            background: #11998e;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }
        .nav-btn-large:hover:not(:disabled) {
            background: #0d6e69;
            transform: translateY(-2px);
        }
        .nav-btn-large:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #11998e 0%, #38ef7d 100%);
            height: 100%;
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 13px;
            color: #999;
            text-align: center;
            margin-bottom: 10px;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Pipedrive Sales Process</h1>
            <p>Master Pipedrive platform, pipeline hygiene, and sales data standards</p>
        </header>

        <div class="progress-text" id="progressText">Module 1 of 6 • Lesson 1 of 10</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 10%;"></div>
        </div>

        <div class="course-nav" id="courseNav"></div>

        <div class="content-area">
            <div id="modulesContainer"></div>
        </div>

        <div class="navigation">
            <button class="nav-btn-large" id="prevBtn" onclick="previousLesson()">← Previous Lesson</button>
            <button class="nav-btn-large" id="nextBtn" onclick="nextLesson()">Next Lesson →</button>
        </div>
    </div>

    <script>
        const courseData = {
            modules: [
                {
                    title: "Five Golden Rules",
                    quiz: [
                        {
                            question: "How many Golden Rules must all BD and Sales team members follow?",
                            options: ["3", "5", "7", "10"],
                            correct: 1
                        },
                        {
                            question: "What should data in Pipedrive reflect?",
                            options: ["Aspirational targets", "Reality - accurate MRR, TCV, probability, stage", "Best case scenarios", "Marketing projections"],
                            correct: 1
                        },
                        {
                            question: "How long before a deal is flagged as 'Rotting'?",
                            options: ["7 days", "14 days", "21 days", "30 days"],
                            correct: 1
                        }
                    ],
                    lessons: [
                        {
                            title: "Non-Negotiable Rules for All Teams",
                            content: "The Five Golden Rules — non-negotiable for every BD and Sales team member:\n\n1. Everything in Pipedrive - Every lead in Pipedrive before any commercial discussion proceeds\n2. One Organisation per Customer - Always check for duplicates before creating new Organisations\n3. Deals Live Under Organisations - Never create standalone deals\n4. Data Reflects Reality - MRR, TCV, probability and stage must be accurate, not aspirational\n5. No Rotting Deals - Deals untouched for 14 days flagged as Rotting; 21 days escalates to Sales Head\n\nCompliance reviewed monthly by Finance Director for investor pipeline reporting.",
                            keyPoints: ["Data integrity", "Organisation structure", "Deal hygiene"]
                        }
                    ]
                },
                {
                    title: "Organisation Setup & Naming",
                    quiz: [
                        {
                            question: "What is an 'Organisation' in Pipedrive?",
                            options: ["A sales team", "A marketing campaign", "The customer company; all Deals, Contacts and activity sit under it", "A product line"],
                            correct: 2
                        },
                        {
                            question: "When should the monthly dedup sweep happen?",
                            options: ["First Friday", "Last Friday", "Every Friday", "Monthly, no specific day"],
                            correct: 1
                        },
                        {
                            question: "What should you use for Organisation naming?",
                            options: ["Abbreviations and nicknames", "The legal trading name", "Internal shorthand", "Any name that works"],
                            correct: 1
                        }
                    ],
                    lessons: [
                        {
                            title: "Organisation Structure & Duplicate Prevention",
                            content: "Organisation = the customer company; all Deals, Contacts and activity sit under it.\n\nAutomated Creation (Most Cases):\n• Most Organisations arrive via Surfe (LinkedIn) or bulk list uploads\n• Duplicate risk lives at import, not just manual entry\n\nManual Creation — Search First:\n• Search by company name (try variations) and by email domain\n• If match exists, link to it\n\nMonthly Dedup Sweep:\n• Last Friday each month, RevOps runs Pipedrive's duplicate detection\n• Merges are admin-only, logged automatically\n\nWhy It Matters: Clean Organisations prevent duplicate pipeline, broken reporting, and investor-deck errors.",
                            keyPoints: ["Duplicate prevention", "Monthly audits", "Data integrity"]
                        },
                        {
                            title: "Organisation Naming Standards",
                            content: "Use the legal trading name — the same name that appears on the contract\n\n✓ Correct Examples:\n• Eranya Cloud Ltd\n• Cloudless Labs Inc.\n• io.net Inc.\n• Blumetis Pte. Ltd.\n\n✗ Incorrect — Don't Use:\n• Abbreviations (Eranya / CLabs)\n• Informal names (ionet / IO.NET / Blumetis SG)\n\nAuto-Imported Names OK, Corrected at Two Points:\n1. Monthly sweep normalizes names to legal trading name\n2. Finance verifies match before any contract is issued\n\nManual Entries: Use legal trading name from outset — no abbreviations.",
                            keyPoints: ["Legal naming", "Consistency", "Contract alignment"]
                        }
                    ]
                },
                {
                    title: "Pipeline Stages & Deal Data",
                    quiz: [
                        {
                            question: "How many pipeline stages are there?",
                            options: ["3", "4", "5", "6"],
                            correct: 2
                        },
                        {
                            question: "What probability is assigned to the 'Proposal/NDA + SO' stage?",
                            options: ["30%", "50%", "75%", "90%"],
                            correct: 2
                        },
                        {
                            question: "What formula is used to calculate MRR?",
                            options: ["Node count × daily rate", "Node count × daily rate × 30 days", "Node count + daily rate", "Daily rate ÷ 30 days"],
                            correct: 1
                        }
                    ],
                    lessons: [
                        {
                            title: "Five Pipeline Stages",
                            content: "Pipedrive Pipeline Stages with Probability & Ownership:\n\n1. Lead (10%) - Logged, not yet selling\n   Owner: BD | Status: Contact entered, Organisation linked, product tagged\n\n2. Prospect (30%) - Actively selling\n   Owner: BD | Status: Need/budget confirmed, MRR/TCV estimate, demo complete\n\n3. Proposal/NDA + SO (75%) - Papered\n   Owner: Sales + Finance | Status: Proposal issued, NDA/SO signed, KYB initiated\n\n4. POC — Active (90%) - Proving value\n   Owner: Sales + POC Lead | Status: POC running, commercial parallel, KYB concurrent, final TCV confirmed\n\n5. Customer — Won (100%) - Live & billing\n   Owner: Sales/Account Manager | Status: KYB cleared, GPU provisioning live, MRR confirmed",
                            keyPoints: ["5-stage pipeline", "Clear ownership", "Probability tracking"]
                        },
                        {
                            title: "Deal Data & MRR/TCV Calculation",
                            content: "Every Deal carries accurate value data at every stage.\n\nMandatory Structure:\n• Linked to an Organisation (no standalone deals)\n• All mandatory fields complete\n\nValue Calculations:\n• MRR = Node count × daily rate × 30 days\n  Example: 20 nodes × $14/day × 30 = $8,400/mo\n\n• ACV = MRR × 12\n  Example: $8,400 × 12 = $100,800\n\n• TCV = MRR × contract length in months\n  Example: $8,400 × 24 = $201,600\n\nDeal Value = TCV (always)\nKeep All Three Current: Update MRR, ACV and TCV from Stage 2 onwards — never blank. Switch to actuals once proposal is issued.",
                            keyPoints: ["Value tracking", "Accurate calculations", "From Stage 2 onwards"]
                        }
                    ]
                },
                {
                    title: "BD to Sales Handover",
                    quiz: [
                        {
                            question: "When does ownership transfer from BD to Sales?",
                            options: ["At Lead stage", "At Prospect stage", "At Proposal/NDA + SO stage", "At POC stage"],
                            correct: 2
                        },
                        {
                            question: "What must be included in a handover comment?",
                            options: ["Only demo date", "Only budget status", "Demo date, confirmed need, budget status, key concerns, agreed next step", "Only agreed next step"],
                            correct: 2
                        },
                        {
                            question: "Should BD stay as a Follower after handover?",
                            options: ["No, remove themselves", "Yes, stay as Follower", "Only if sales rep asks", "Only for large deals"],
                            correct: 1
                        }
                    ],
                    lessons: [
                        {
                            title: "Handover Process",
                            content: "BD owns Lead through Prospect; ownership transfers to Sales at Proposal/NDA + SO\n\nComplete Handover Steps:\n1. Move the Stage - From Prospect to Proposal/NDA + SO once demo done and need confirmed\n2. Reassign the Owner - Change to assigned sales rep per assignment matrix\n3. Confirm the Numbers - MRR, TCV, and node count entered before stage moves\n4. Add Handover Comment - Post in Pipedrive and @mention assigned sales rep\n5. Set the Followers - Tag POC owner as Follower; BD stays as Follower\n\nHandover Comment Must Include:\n• Demo date\n• Confirmed need\n• Budget status\n• Key concerns\n• Agreed next step and date\n\nComplete every handover step before moving to Proposal stage.",
                            keyPoints: ["Clean hand-offs", "Documentation", "Team collaboration"]
                        }
                    ]
                },
                {
                    title: "Renewals & Pipeline Hygiene",
                    quiz: [
                        {
                            question: "When should a renewal deal be created?",
                            options: ["When customer mentions it", "90 days before contract end", "On contract end date", "When sales rep remembers"],
                            correct: 1
                        },
                        {
                            question: "What stage should renewal deals start at?",
                            options: ["Lead", "Prospect", "Proposal", "POC"],
                            correct: 1
                        },
                        {
                            question: "When is the best time to perform weekly hygiene?",
                            options: ["Monday morning", "Wednesday afternoon", "Friday by 5 pm", "Whenever convenient"],
                            correct: 2
                        }
                    ],
                    lessons: [
                        {
                            title: "Renewal Deal Management",
                            content: "Sales owns renewals proactively — every renewal is created manually\n\nRenewal Best Practices:\n• No Auto-Renewals - Each renewal is a new Deal under same Organisation\n• Create 90 Days Out - Open renewal 90 days before contract end date\n• Start at Prospect - Renewal begins at Prospect stage (relationship exists)\n• Automate the Reminder - Workflow: When deal Won → create task for renewal 90 days before end\n• Name It Clearly - 'Cloudless Labs — GPUaaS 40x H100 — US-East — Renewal 2027'\n\nUntil RevOps Exists: Renewals tracked manually by deal owner.\n\nKey Rule: Create the renewal deal 90 days before contract end — never wait for the customer.",
                            keyPoints: ["Proactive renewals", "90-day advance", "Clear naming"]
                        },
                        {
                            title: "Weekly Pipeline Hygiene",
                            content: "Keep the pipeline clean — and close out dead deals honestly.\n\nWeekly Hygiene — Every Friday by 5 pm:\n• Update stage and probability on every open deal\n• Refresh MRR, TCV and node count to reality\n• Add comment to anything touched this week\n• Reschedule overdue activities\n• Mark dead deals as Lost\n\nLost/Dead Deal Process:\n1. Set stage to Lost immediately — don't leave active\n2. Select a Loss Reason from dropdown\n3. Add 2-3 sentence note: what happened and the lesson\n4. If may reopen, schedule follow-up 90 days out\n\nWhy Hygiene Matters:\n• Deals untouched 14 days → auto-flagged Rotting\n• Owner notified immediately\n• After 7 more days → Sales Head alerted\n• Friday hygiene stops stale deals from reaching monthly report\n\nA clean pipeline on Friday is an accurate pipeline report on Monday.",
                            keyPoints: ["Weekly discipline", "Rotting flag", "Honest lost deals"]
                        }
                    ]
                },
                {
                    title: "Comments & Data Standards",
                    quiz: [
                        {
                            question: "Who owns the comments at each stage?",
                            options: ["Only the deal creator", "Only the Sales Head", "Whoever owns the deal at that stage", "The Finance Director only"],
                            correct: 2
                        },
                        {
                            question: "How often should POC comments be updated?",
                            options: ["Daily", "Weekly", "Monthly", "At deal close only"],
                            correct: 1
                        },
                        {
                            question: "What is the purpose of consistent data standards?",
                            options: ["Busy work", "Credible investor reporting and financial accuracy", "Marketing only", "No real purpose"],
                            correct: 1
                        }
                    ],
                    lessons: [
                        {
                            title: "Comment Standards by Stage",
                            content: "Whoever owns the deal at each stage owns its comments — keep them current.\n\nOpening Comment — Stage 1 (Lead):\n• How the lead came in (source and connection name if LinkedIn)\n• What prospect indicated about their need\n• Agreed next step and date\n\nActivity Comment — Every Interaction:\n• What was discussed or agreed\n• Any change to deal value, node count, or timeline\n• Next action and date\n\nStage 3 — NDA + SO Signed (Sales):\n• NDA signed date and counterparty signatory\n• Sales Order signed date and confirmed TCV\n• KYB initiation confirmed with Finance\n• POC start date agreed\n\nPOC Comment — Weekly (POC Owner):\n• Progress status: on track / at risk / blocked\n• Technical issues or customer feedback\n• Expected POC completion date\n\nComments are the audit trail of every deal — and the source of investor reporting.",
                            keyPoints: ["Stage ownership", "Audit trail", "Investor credibility"]
                        },
                        {
                            title: "Lead Source, Naming & Governance",
                            content: "Consistent inputs lead to credible investor reporting.\n\nLead Sources — Set at Entry:\nRecord the Source field on every new lead:\n• LinkedIn (Surfe)\n• Inbound\n• Referral/Partner\n• Event\n• Outbound\n• Customer expansion\n\nDeal Naming Convention:\nLegal name · product · geography · 'Renewal [Year]' suffix\n\nExample: Cloudless Labs — GPUaaS 40x H100 — US-East — Renewal 2027\n\nRoles — RACI:\n• R = Responsible\n• A = Accountable\n• C = Consulted\n• I = Informed\n\nMonthly Pipeline Review:\n• Finance Director reviews data monthly\n• Incomplete/implausible deals returned to owners\n• Before investor report issued\n\nWhy It All Matters:\nClean Pipedrive data is the direct input to investor reporting — the commercial team's contribution to fundraising credibility. If the data is wrong, the investor numbers are wrong — accuracy is everyone's job.",
                            keyPoints: ["Consistent standards", "RACI clarity", "Investor readiness"]
                        }
                    ]
                }
            ]
        };

        let currentModuleIdx = 0;
        let currentLessonIdx = 0;
        let showingQuiz = false;
        let quizAnswers = {};

        function init() {
            render();
        }

        function render() {
            renderModuleNav();
            renderContent();
            updateProgress();
            updateNavButtons();
        }

        function renderModuleNav() {
            const nav = document.getElementById('courseNav');
            nav.innerHTML = '';
            courseData.modules.forEach((module, idx) => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn' + (idx === currentModuleIdx ? ' active' : '');
                btn.textContent = `Module ${idx + 1}`;
                btn.onclick = () => goToModule(idx);
                nav.appendChild(btn);
            });
        }

        function renderContent() {
            const container = document.getElementById('modulesContainer');
            const module = courseData.modules[currentModuleIdx];
            
            if (showingQuiz) {
                renderQuiz(container, module);
            } else {
                container.innerHTML = `<div class="module"><h2>${module.title}</h2></div>`;
                const lesson = module.lessons[currentLessonIdx];
                const lessonDiv = document.createElement('div');
                lessonDiv.className = 'lesson';
                lessonDiv.innerHTML = `
                    <h3>${lesson.title}</h3>
                    <div class="lesson-content">${lesson.content}</div>
                    <div class="key-points">
                        <h4>📌 Key Takeaways</h4>
                        <div>${lesson.keyPoints.map(point => `<span class="key-point-tag">${point}</span>`).join('')}</div>
                    </div>
                `;
                container.appendChild(lessonDiv);
            }
        }

        function renderQuiz(container, module) {
            container.innerHTML = `
                <div class="quiz-container">
                    <div class="quiz-title">📝 Module Quiz</div>
                    <div class="quiz-subtitle">Test your knowledge on "${module.title}"</div>
                </div>
            `;

            module.quiz.forEach((q, qIdx) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'quiz-question';
                qDiv.innerHTML = `<div class="quiz-question-text">Q${qIdx + 1}. ${q.question}</div>`;
                
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'quiz-options';
                
                q.options.forEach((option, oIdx) => {
                    const optDiv = document.createElement('div');
                    optDiv.className = 'quiz-option';
                    optDiv.textContent = option;
                    
                    if (quizAnswers[qIdx] !== undefined) {
                        if (oIdx === q.correct) {
                            optDiv.classList.add('correct');
                        } else if (oIdx === quizAnswers[qIdx]) {
                            optDiv.classList.add('incorrect');
                        }
                    } else {
                        optDiv.onclick = () => selectAnswer(qIdx, oIdx);
                    }
                    optionsDiv.appendChild(optDiv);
                });
                
                qDiv.appendChild(optionsDiv);
                container.appendChild(qDiv);
            });

            if (Object.keys(quizAnswers).length === module.quiz.length) {
                const score = calculateScore(module.quiz);
                const resultsDiv = document.createElement('div');
                resultsDiv.className = 'quiz-results';
                resultsDiv.innerHTML = `
                    <div class="quiz-score">${score}/${module.quiz.length}</div>
                    <div class="quiz-feedback">
                        ${score === module.quiz.length ? '🎉 Perfect! You mastered this module!' : 
                          score >= module.quiz.length * 0.67 ? '✅ Great job! You understand the key concepts.' :
                          '📚 Review the material and try again to improve your score.'}
                    </div>
                `;
                container.appendChild(resultsDiv);
            }
        }

        function selectAnswer(qIdx, oIdx) {
            quizAnswers[qIdx] = oIdx;
            render();
        }

        function calculateScore(quiz) {
            let score = 0;
            quiz.forEach((q, idx) => {
                if (quizAnswers[idx] === q.correct) {
                    score++;
                }
            });
            return score;
        }

        function updateProgress() {
            const totalLessons = courseData.modules.reduce((sum, m) => sum + m.lessons.length, 0);
            const completedLessons = courseData.modules.slice(0, currentModuleIdx).reduce((sum, m) => sum + m.lessons.length, 0) + currentLessonIdx + 1;
            const progressPercent = (completedLessons / totalLessons) * 100;
            
            document.getElementById('progressFill').style.width = progressPercent + '%';
            document.getElementById('progressText').textContent = `Module ${currentModuleIdx + 1} of ${courseData.modules.length}${showingQuiz ? ' • Quiz' : ' • Lesson ' + completedLessons + ' of ' + totalLessons}`;
        }

        function updateNavButtons() {
            const totalLessons = courseData.modules.reduce((sum, m) => sum + m.lessons.length, 0);
            const currentLesson = courseData.modules.slice(0, currentModuleIdx).reduce((sum, m) => sum + m.lessons.length, 0) + currentLessonIdx + 1;
            
            document.getElementById('prevBtn').disabled = currentLesson === 1 && !showingQuiz;
            document.getElementById('nextBtn').disabled = false;
        }

        function nextLesson() {
            if (showingQuiz) {
                const module = courseData.modules[currentModuleIdx];
                if (Object.keys(quizAnswers).length < module.quiz.length) {
                    alert('Please answer all questions before proceeding.');
                    return;
                }
                showingQuiz = false;
                quizAnswers = {};
                
                const module2 = courseData.modules[currentModuleIdx];
                if (currentLessonIdx < module2.lessons.length - 1) {
                    currentLessonIdx++;
                } else if (currentModuleIdx < courseData.modules.length - 1) {
                    currentModuleIdx++;
                    currentLessonIdx = 0;
                }
            } else {
                const module = courseData.modules[currentModuleIdx];
                if (currentLessonIdx < module.lessons.length - 1) {
                    currentLessonIdx++;
                } else if (currentModuleIdx < courseData.modules.length - 1) {
                    showingQuiz = true;
                    quizAnswers = {};
                } else {
                    return;
                }
            }
            render();
        }

        function previousLesson() {
            if (showingQuiz) {
                showingQuiz = false;
                quizAnswers = {};
            } else if (currentLessonIdx > 0) {
                currentLessonIdx--;
            } else if (currentModuleIdx > 0) {
                currentModuleIdx--;
                currentLessonIdx = courseData.modules[currentModuleIdx].lessons.length - 1;
            }
            render();
        }

        function goToModule(idx) {
            currentModuleIdx = idx;
            currentLessonIdx = 0;
            showingQuiz = false;
            quizAnswers = {};
            render();
        }

        init();
    </script>
</body>
</html>
