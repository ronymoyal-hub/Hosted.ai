<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Methodology BDR & ISR - Online Course</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        header p {
            font-size: 16px;
            opacity: 0.9;
        }
        .course-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .nav-btn {
            padding: 8px 16px;
            background: white;
            border: 2px solid #667eea;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            color: #667eea;
            transition: all 0.3s;
        }
        .nav-btn:hover {
            background: #667eea;
            color: white;
        }
        .nav-btn.active {
            background: #667eea;
            color: white;
        }
        .content-area {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        .module h2 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 30px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }
        .lesson {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            border-radius: 5px;
        }
        .lesson h3 {
            color: #333;
            font-size: 22px;
            margin-bottom: 15px;
        }
        .lesson-content {
            line-height: 1.8;
            color: #555;
            font-size: 15px;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }
        .key-points {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }
        .key-points h4 {
            color: #667eea;
            font-size: 14px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .key-point-tag {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        .quiz-container {
            animation: fadeIn 0.3s;
        }
        .quiz-title {
            text-align: center;
            color: #667eea;
            font-size: 26px;
            margin-bottom: 10px;
        }
        .quiz-subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .quiz-question {
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .quiz-question-text {
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .quiz-option {
            padding: 12px 16px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: left;
        }
        .quiz-option:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }
        .quiz-option.selected {
            border-color: #667eea;
            background: #f0f2ff;
        }
        .quiz-option.correct {
            border-color: #4caf50;
            background: #e8f5e9;
            color: #2e7d32;
        }
        .quiz-option.incorrect {
            border-color: #f44336;
            background: #ffebee;
            color: #c62828;
        }
        .quiz-results {
            text-align: center;
            padding: 30px;
            background: #f0f2ff;
            border-radius: 8px;
            margin: 30px 0;
        }
        .quiz-score {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }
        .quiz-feedback {
            font-size: 16px;
            color: #333;
            margin-bottom: 20px;
        }
        .navigation {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 30px;
        }
        .nav-btn-large {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
        }
        .nav-btn-large:hover:not(:disabled) {
            background: #764ba2;
            transform: translateY(-2px);
        }
        .nav-btn-large:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .progress-bar {
            background: #e0e0e0;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 13px;
            color: #999;
            text-align: center;
            margin-bottom: 10px;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Sales Methodology BDR & ISR</h1>
            <p>Master BDR and ISR roles, lead qualification, and sales processes</p>
        </header>

        <div class="progress-text" id="progressText">Module 1 of 5 • Lesson 1 of 10</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 10%;"></div>
        </div>

        <div class="course-nav" id="courseNav"></div>

        <div class="content-area">
            <div id="modulesContainer"></div>
        </div>

        <div class="navigation">
            <button class="nav-btn-large" id="prevBtn" onclick="previousLesson()">← Previous Lesson</button>
            <button class="nav-btn-large" id="nextBtn" onclick="nextLesson()">Next Lesson →</button>
        </div>
    </div>

    <script>
        const courseData = {
            modules: [
                {
                    title: "Understanding the BDR Role",
                    quiz: [
                        {
                            question: "What are the Four P's used by BDRs for fact-finding?",
                            options: ["Pain, Product, Power, Pressure", "Price, Product, Process, People", "Phone, Portal, Platform, Process", "Prospect, Priority, Plan, Pipeline"],
                            correct: 0
                        },
                        {
                            question: "What does SAL stand for?",
                            options: ["Sales Alert Lead", "Sales Accepted Lead", "Sales Assigned Lead", "Sales Active Lead"],
                            correct: 1
                        },
                        {
                            question: "What is the primary goal of the BDR core process?",
                            options: ["Close all deals immediately", "Convert leads → SALs → passed to ISR → won Deals", "Maximize outbound calls only", "Eliminate all cold leads"],
                            correct: 1
                        }
                    ],
                    lessons: [
                        {
                            title: "BDR Keys to Success",
                            content: "The BDR is a dedicated, proactive demand-generation resource — the 'Front page' of the organization. Key responsibilities include:\n\n• Lead Ownership: Handles every lead before transfer to ISR\n• Fact-Finding: Using the Four P's (Pain, Product, Power, Pressure)\n• Communications: Phone, email, and social media\n• Deal Maker: Learning prospect needs and confirming interest\n• SQL Development: Converting leads into Sales Accepted Leads (SALs)",
                            keyPoints: ["Lead ownership", "Four P's framework", "SAL development"]
                        },
                        {
                            title: "The BDR Core Process",
                            content: "The BDR process follows 6 key stages:\n\n1. Lead Assignment - BDRs receive leads (prospects who may want to buy)\n2. Lead Score - Each lead gets a score showing desire to purchase\n3. Warm Up - Regular calls to find interest and buying ability\n4. Qualify - Well-qualified leads become deals\n5. SAL Handoff - Passing qualified leads to Inside Sales Reps (ISRs)\n6. Deal Close - ISRs convert SALs into won deals\n\nKey Goal: Convert leads → SALs → passed to ISR → won Deals",
                            keyPoints: ["6-stage process", "Lead scoring", "SAL handoff"]
                        }
                    ]
                },
                {
                    title: "Lead Qualification & Management",
                    quiz: [
                        {
                            question: "Why is lead qualification important?",
                            options: ["It wastes time", "It protects deal quality, saves resources, and maximizes revenue", "It's not important", "It only matters for cold leads"],
                            correct: 1
                        },
                        {
                            question: "What lead score range indicates a 'Hot' lead (MQL)?",
                            options: ["0-49", "50-99", "100+", "150+"],
                            correct: 2
                        },
                        {
                            question: "What do BANT and ANUM frameworks help determine?",
                            options: ["Lead volume", "Whether a lead is properly qualified", "The cost per lead", "Customer satisfaction"],
                            correct: 1
                        }
                    ],
                    lessons: [
                        {
                            title: "Why the Lead Process Matters",
                            content: "A well-run lead process protects deal quality, saves resources, and maximizes revenue:\n\n❄️ Cold Leads Need Warming - Some leads are 'cold' and need warming before productive work\n🎯 Focus on Best Prospects - Other leads remain 'cold' and should be remarketed\n✅ Qualification Drives Quality - Deals require well-qualified leads\n🔥 Only Hot Leads Become Deals - Keeping the pipeline clean\n⏱️ Time = Revenue - Lost deals with low probability directly lose revenue",
                            keyPoints: ["Lead quality", "Pipeline health", "Resource efficiency"]
                        },
                        {
                            title: "Lead Stages & Scoring",
                            content: "The HAI lead progression system:\n\nRAW (0-49): 'Cold' - Just downloaded content, no clear intent\nMQI (50-99): 'Warm' - Signed up for webinar but didn't attend\nMQL (100+): 'Hot' - Attended webinar and shows clear interest\n\nLead Score accumulates across all prospect activities. As leads progress through stages, different teams take ownership.",
                            keyPoints: ["Score ranges", "Stage progression", "Team responsibilities"]
                        },
                        {
                            title: "BANT & ANUM Qualification",
                            content: "Two complementary qualification frameworks:\n\nBANT:\n• Budget - Amount allocated for the project\n• Authority - Decision makers and their process\n• Need - Solution requirements\n• Time - Implementation timeframe\n\nANUM:\n• Authority - Decision makers and approval process\n• Need - Solution requirements\n• Urgency - Implications of not having the solution\n• Money - Budget process",
                            keyPoints: ["BANT framework", "ANUM framework", "Comprehensive qualification"]
                        }
                    ]
                },
                {
                    title: "BDR Target Metrics & Enablement",
                    quiz: [
                        {
                            question: "What is the target MQL to SAL conversion rate for BDRs?",
                            options: ["10%", "≥25%", "50%", "100%"],
                            correct: 1
                        },
                        {
                            question: "How many SALs should a BDR aim to create per day on average?",
                            options: ["1", "1.5", "3", "5"],
                            correct: 1
                        },
                        {
                            question: "Which of the following is NOT part of BDR training curriculum?",
                            options: ["BANT methodology", "HAI Product Training", "Advanced accounting", "MEDDIC methodology"],
                            correct: 2
                        }
                    ],
                    lessons: [
                        {
                            title: "BDR Performance Targets",
                            content: "BDR Target Metrics for success:\n\n• 150–200 outbound daily touch-points\n• ≥25% MQL → SAL conversion\n• 1.5 SALs / day average\n• 70% SALs → qualified deals\n\nThese metrics drive accountability and ensure consistent lead quality and volume.",
                            keyPoints: ["Touch-point targets", "Conversion rates", "Daily SAL goals"]
                        },
                        {
                            title: "BDR Training & Onboarding",
                            content: "Comprehensive BDR enablement includes:\n\nTraining Curriculum:\n• HAI Product Training\n• HAI Sales Training\n• BDR-specific Training\n• MEDDIC, BANT, ANUM methodologies\n\nSkills & Coaching:\n• Persona training (who are we selling to?)\n• Custom scripts for verbal, email, and voice mail\n• Weekly role-playing and objection handling\n• Sales operations training\n\nDocumentation:\n• Input all activity into PD (Pipedrive)\n• Update lead status and Four P's details\n• Set next follow-up as task",
                            keyPoints: ["Structured curriculum", "Ongoing coaching", "Tool proficiency"]
                        }
                    ]
                },
                {
                    title: "ISR Role & Sales Progression",
                    quiz: [
                        {
                            question: "What does ISR stand for?",
                            options: ["Inside Sales Representative", "Integrated Sales Role", "Initial Sales Referral", "Internal Sales Review"],
                            correct: 0
                        },
                        {
                            question: "What are the ISR KPIs?",
                            options: ["Only call volume", "30-day CSP close, 60-day DCO close, Grow ARR", "Email response time", "Customer satisfaction only"],
                            correct: 1
                        },
                        {
                            question: "How many steps are in the ISR sales process?",
                            options: ["5 steps", "8 steps", "13 steps", "20 steps"],
                            correct: 2
                        }
                    ],
                    lessons: [
                        {
                            title: "ISR Profile & Workflow",
                            content: "ISR (Inside Sales Representative) Profile:\n• High volume CSP/DCO logos hunting\n• Structured, disciplined, dedicated hunting team\n• KPIs: 30-day CSP close, 60-day DCO close, Grow ARR\n\nISR 13-Step Sales Process:\n1. CXO kick-off meeting (handoff from BDR)\n2. Convert lead in Pipedrive\n3. Update PD and follow qualification steps\n4. Business case development\n5. Pre-Sales: demo, biz plan, design modeling\n6. POC/Test/Solution validation\n7. Proposal presentation\n8. Deal business terms\n9. Close/Win/MSA execution\n10. Celebrate win\n11. Delivery\n12. Enable customer\n13. Upsell and grow",
                            keyPoints: ["ISR KPIs", "13-step process", "Deal progression"]
                        }
                    ]
                },
                {
                    title: "Lead Management Excellence",
                    quiz: [
                        {
                            question: "Which leads should be prioritized first in lead management?",
                            options: ["RAW leads", "MQL leads", "Cold leads", "Any lead randomly"],
                            correct: 1
                        },
                        {
                            question: "What is key to every successful qualification call?",
                            options: ["Making the call as long as possible", "Obtaining clear summary of needs, following methodology, and ensuring clear next steps", "Just talking about your product", "Getting the deal closed immediately"],
                            correct: 1
                        },
                        {
                            question: "Is a healthy lead workflow iterative?",
                            options: ["No, do it once", "Yes, keep calling and following up", "Only for new leads", "Never necessary"],
                            correct: 1
                        }
                    ],
                    lessons: [
                        {
                            title: "Workflow Overview & Best Practices",
                            content: "Lead Management Best Practices:\n\n1. Prioritize MQL leads first - Work highest priority leads based on conversion likelihood\n2. Check SAL next follow-up - Ensure no lead goes cold\n3. Last Activity Date check - Identify neglected leads\n\nQualification Call Sheet:\n• Structure every call for maximum impact\n• Obtain clear summary of needs\n• Follow BANT/ANUM methodology\n• Ensure clear next steps\n\nA healthy lead workflow is iterative—keep calling and following up until leads convert or are properly remarked.",
                            keyPoints: ["Lead prioritization", "Call structure", "Ongoing engagement"]
                        },
                        {
                            title: "Real Lead Journey Example",
                            content: "Example: Lead progression from RAW to Deal\n\n1. RAW Lead Created - Prospect clicks link in HAI email → RAW lead created\n2. Becomes MQI (score 50) - Signs up for webinar but doesn't attend\n3. Becomes MQL (score 100) - BDR calls, prospect shows interest\n4. SAL Created - BDR qualifies on budget, need, urgency → becomes SAL\n5. Converted to Deal - ISR deems well-qualified → converts to Deal (SQL)\n\nThis journey illustrates the complete progression and hand-offs between teams.",
                            keyPoints: ["Progressive qualification", "Team hand-offs", "Timeline example"]
                        }
                    ]
                }
            ]
        };

        let currentModuleIdx = 0;
        let currentLessonIdx = 0;
        let showingQuiz = false;
        let quizAnswers = {};

        function init() {
            render();
        }

        function render() {
            renderModuleNav();
            renderContent();
            updateProgress();
            updateNavButtons();
        }

        function renderModuleNav() {
            const nav = document.getElementById('courseNav');
            nav.innerHTML = '';
            courseData.modules.forEach((module, idx) => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn' + (idx === currentModuleIdx ? ' active' : '');
                btn.textContent = `Module ${idx + 1}`;
                btn.onclick = () => goToModule(idx);
                nav.appendChild(btn);
            });
        }

        function renderContent() {
            const container = document.getElementById('modulesContainer');
            const module = courseData.modules[currentModuleIdx];
            
            if (showingQuiz) {
                renderQuiz(container, module);
            } else {
                container.innerHTML = `<div class="module"><h2>${module.title}</h2></div>`;
                const lesson = module.lessons[currentLessonIdx];
                const lessonDiv = document.createElement('div');
                lessonDiv.className = 'lesson';
                lessonDiv.innerHTML = `
                    <h3>${lesson.title}</h3>
                    <div class="lesson-content">${lesson.content}</div>
                    <div class="key-points">
                        <h4>📌 Key Takeaways</h4>
                        <div>${lesson.keyPoints.map(point => `<span class="key-point-tag">${point}</span>`).join('')}</div>
                    </div>
                `;
                container.appendChild(lessonDiv);
            }
        }

        function renderQuiz(container, module) {
            container.innerHTML = `
                <div class="quiz-container">
                    <div class="quiz-title">📝 Module Quiz</div>
                    <div class="quiz-subtitle">Test your knowledge on "${module.title}"</div>
                </div>
            `;

            module.quiz.forEach((q, qIdx) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'quiz-question';
                qDiv.innerHTML = `<div class="quiz-question-text">Q${qIdx + 1}. ${q.question}</div>`;
                
                const optionsDiv = document.createElement('div');
                optionsDiv.className = 'quiz-options';
                
                q.options.forEach((option, oIdx) => {
                    const optDiv = document.createElement('div');
                    optDiv.className = 'quiz-option';
                    optDiv.textContent = option;
                    
                    if (quizAnswers[qIdx] !== undefined) {
                        if (oIdx === q.correct) {
                            optDiv.classList.add('correct');
                        } else if (oIdx === quizAnswers[qIdx]) {
                            optDiv.classList.add('incorrect');
                        }
                    } else {
                        optDiv.onclick = () => selectAnswer(qIdx, oIdx);
                    }
                    optionsDiv.appendChild(optDiv);
                });
                
                qDiv.appendChild(optionsDiv);
                container.appendChild(qDiv);
            });

            if (Object.keys(quizAnswers).length === module.quiz.length) {
                const score = calculateScore(module.quiz);
                const resultsDiv = document.createElement('div');
                resultsDiv.className = 'quiz-results';
                resultsDiv.innerHTML = `
                    <div class="quiz-score">${score}/${module.quiz.length}</div>
                    <div class="quiz-feedback">
                        ${score === module.quiz.length ? '🎉 Perfect! You mastered this module!' : 
                          score >= module.quiz.length * 0.67 ? '✅ Great job! You understand the key concepts.' :
                          '📚 Review the material and try again to improve your score.'}
                    </div>
                `;
                container.appendChild(resultsDiv);
            }
        }

        function selectAnswer(qIdx, oIdx) {
            quizAnswers[qIdx] = oIdx;
            render();
        }

        function calculateScore(quiz) {
            let score = 0;
            quiz.forEach((q, idx) => {
                if (quizAnswers[idx] === q.correct) {
                    score++;
                }
            });
            return score;
        }

        function updateProgress() {
            const totalLessons = courseData.modules.reduce((sum, m) => sum + m.lessons.length, 0);
            const completedLessons = courseData.modules.slice(0, currentModuleIdx).reduce((sum, m) => sum + m.lessons.length, 0) + currentLessonIdx + 1;
            const progressPercent = (completedLessons / totalLessons) * 100;
            
            document.getElementById('progressFill').style.width = progressPercent + '%';
            document.getElementById('progressText').textContent = `Module ${currentModuleIdx + 1} of ${courseData.modules.length}${showingQuiz ? ' • Quiz' : ' • Lesson ' + completedLessons + ' of ' + totalLessons}`;
        }

        function updateNavButtons() {
            const totalLessons = courseData.modules.reduce((sum, m) => sum + m.lessons.length, 0);
            const currentLesson = courseData.modules.slice(0, currentModuleIdx).reduce((sum, m) => sum + m.lessons.length, 0) + currentLessonIdx + 1;
            
            document.getElementById('prevBtn').disabled = currentLesson === 1 && !showingQuiz;
            document.getElementById('nextBtn').disabled = false;
        }

        function nextLesson() {
            if (showingQuiz) {
                const module = courseData.modules[currentModuleIdx];
                if (Object.keys(quizAnswers).length < module.quiz.length) {
                    alert('Please answer all questions before proceeding.');
                    return;
                }
                showingQuiz = false;
                quizAnswers = {};
                
                const module2 = courseData.modules[currentModuleIdx];
                if (currentLessonIdx < module2.lessons.length - 1) {
                    currentLessonIdx++;
                } else if (currentModuleIdx < courseData.modules.length - 1) {
                    currentModuleIdx++;
                    currentLessonIdx = 0;
                }
            } else {
                const module = courseData.modules[currentModuleIdx];
                if (currentLessonIdx < module.lessons.length - 1) {
                    currentLessonIdx++;
                } else if (currentModuleIdx < courseData.modules.length - 1) {
                    showingQuiz = true;
                    quizAnswers = {};
                } else {
                    return;
                }
            }
            render();
        }

        function previousLesson() {
            if (showingQuiz) {
                showingQuiz = false;
                quizAnswers = {};
            } else if (currentLessonIdx > 0) {
                currentLessonIdx--;
            } else if (currentModuleIdx > 0) {
                currentModuleIdx--;
                currentLessonIdx = courseData.modules[currentModuleIdx].lessons.length - 1;
            }
            render();
        }

        function goToModule(idx) {
            currentModuleIdx = idx;
            currentLessonIdx = 0;
            showingQuiz = false;
            quizAnswers = {};
            render();
        }

        init();
    </script>
</body>
</html>
