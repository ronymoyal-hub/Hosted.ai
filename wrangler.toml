name               = "hostedai-order-counter"
main               = "worker.js"
compatibility_date = "2024-01-01"

# ── KV: counter ───────────────────────────────────────────────────────────────
# Run: wrangler kv:namespace create ORDER_COUNTER
[[kv_namespaces]]
binding = "ORDER_COUNTER"
id      = "e5ef5190519a4a5baecff3ab3f0f9103"

# ── KV: orders ────────────────────────────────────────────────────────────────
# Run: wrangler kv:namespace create ORDERS
[[kv_namespaces]]
binding = "ORDERS"
id      = "e16caff3c8f1453fb24b0f24611d580a"

# ── Secrets (never put values here — use wrangler secret put) ─────────────────
#   wrangler secret put API_KEY            → your app password
#   wrangler secret put PIPEDRIVE_TOKEN    → your Pipedrive API token
#   wrangler secret put PIPEDRIVE_DOMAIN   → e.g. "mycompany" (not the full URL)
#   wrangler secret put CF_ACCOUNT_ID      → your Cloudflare account ID
#   wrangler secret put CF_API_TOKEN       → Cloudflare API token with Browser Rendering permission
#   wrangler secret put HOSTEDAI_ORG_ID    → Pipedrive organization ID for hosted·ai (global SalesOrderNumber counter)
