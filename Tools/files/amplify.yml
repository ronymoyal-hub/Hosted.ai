version: 1
frontend:
  phases:
    build:
      commands:
        - echo "Building static site with multi-page routing for hosted.ai tools"
  artifacts:
    baseDirectory: .
    files:
      - index.html
      - AI_Cloud_TCO_Model.html
      - CSP_Mesh_Packet_Dashboard_v2.html
      - tco-calculator.html
      - csp-dashboard.html
      - '**/*.js'
      - '**/*.css'
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
