let _attempts = 0;
const MAX_ATTEMPTS = 10;
let _lockout = false;

async function unlock() {
  if(_lockout) return;
  const pw = document.getElementById('pw').value;
  if(!pw) { showError('Please enter a password.'); return; }
  if(!PAYLOAD) { showError('No encrypted payload found.'); return; }

  _attempts++;
  if(_attempts >= MAX_ATTEMPTS) {
    _lockout = true;
    showError(`Too many attempts. Reload the page to try again.`);
    document.getElementById('unlock-btn').disabled = true;
    return;
  }
  document.getElementById('lock-attempts').textContent =
    _attempts > 1 ? `Attempt ${_attempts} of ${MAX_ATTEMPTS}` : '';

  const btn = document.getElementById('unlock-btn');
  btn.disabled = true;
  btn.textContent = 'Decrypting…';
  document.getElementById('lock-progress').style.display = 'block';
  document.getElementById('lock-error').textContent = '';
  animateBar();

  try {
    const decrypted = await aesDecrypt(pw, PAYLOAD);
    // Success — write the decrypted HTML into the page
    document.open('text/html', 'replace');
    document.write(decrypted);
    document.close();
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Unlock';
    document.getElementById('lock-progress').style.display = 'none';
    document.getElementById('lock-bar').style.width = '0%';
    showError('Incorrect password. Please try again.');
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
  }
}

function showError(msg) {
  const el = document.getElementById('lock-error');
  el.textContent = msg;
  el.style.opacity = '0';
  requestAnimationFrame(() => { el.style.opacity = '1'; });
}

function animateBar() {
  const bar = document.getElementById('lock-bar');
  let w = 0;
  const iv = setInterval(() => {
    w = Math.min(w + (Math.random() * 3), 90);
    bar.style.width = w + '%';
    if(w >= 90) clearInterval(iv);
  }, 80);
}

async function aesDecrypt(password, payload) {
  const enc = new TextEncoder();
  const salt = base64ToBytes(payload.salt);
  const iv   = base64ToBytes(payload.iv);
  const data = base64ToBytes(payload.data);

  // Derive key with PBKDF2
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:310000, hash:'SHA-256' },
    keyMaterial,
    { name:'AES-GCM', length:256 },
    false,
    ['decrypt']
  );
  // Decrypt
  const decrypted = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, data);
  return new TextDecoder().decode(decrypted);
}

function base64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}
